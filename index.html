<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Descent</title>
  <style>
    :root {
      --bg: #111;
      --panel: rgba(255, 255, 255, 0.05);
      --fg: #eee;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      color: var(--fg);
      transition: filter 0.5s ease, background-color 0.5s ease;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    #terminal {
      background: var(--panel);
      padding: 3rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 600px;
      width: 90%;
      position: relative;
    }

    .title {
      margin-top: 0;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .depth {
      color: #ff5e5e;
      font-weight: bold;
    }

    .breadcrumbs {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      color: #4ade80;
      border-left: 4px solid #4ade80;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .breadcrumb-item {
      opacity: 0.8;
    }
    .breadcrumb-item:last-child {
      opacity: 1;
      font-weight: bold;
      color: #fff;
    }
    
    .breadcrumb-separator {
      color: #777;
    }

    .message {
      color: #ffcc00;
      font-style: italic;
      margin-bottom: 1.5rem;
      padding: 0.5rem;
      background: rgba(255, 100, 0, 0.1);
      border-left: 3px solid #ffcc00;
      display: none;
    }

    .doors-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .door {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.05);
      padding: 1.2rem;
      border-radius: 8px;
      color: var(--fg);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .door:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateX(8px);
    }

    .door::after {
      content: '→';
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.2s;
    }

    .door:hover::after {
      opacity: 1;
      transform: translateX(0);
    }

    .scrambled {
      font-family: monospace;
      letter-spacing: 5px;
    }

    /* Glitch Animations */
    @keyframes glitch-shift {
      0% { transform: translate(0) }
      20% { transform: translate(-4px, 4px) }
      40% { transform: translate(-4px, -4px) }
      60% { transform: translate(4px, 4px) }
      80% { transform: translate(4px, -4px) }
      100% { transform: translate(0) }
    }

    @keyframes glitch-clip {
      0% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 2px); }
      20% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
      40% { clip-path: inset(30% 0 40% 0); transform: translate(2px, 2px); }
      60% { clip-path: inset(60% 0 10% 0); transform: translate(-2px, -2px); }
      80% { clip-path: inset(5% 0 80% 0); transform: translate(1px, 1px); }
      100% { clip-path: inset(40% 0 30% 0); transform: translate(-1px, -1px); }
    }

    .glitch-mild {
      animation: glitch-shift 0.3s infinite;
    }

    .glitch-severe {
      animation: glitch-clip 0.1s infinite;
    }

    .glitch-intense {
      animation: glitch-clip 0.05s infinite, glitch-shift 0.1s infinite;
    }

  </style>
</head>
<body>

  <div id="terminal">
    <h1 class="title">DEPTH: <span id="depthLabel" class="depth">0</span></h1>
    <h2 id="pageTitle" style="margin-top:0; font-size: 1.2rem; opacity: 0.7; font-weight: 300;"></h2>
    <div id="highScore" style="display: none; margin-bottom: 1.5rem; color: #a855f7; font-weight: bold; background: rgba(168, 85, 247, 0.1); padding: 0.8rem; border-radius: 6px; border-left: 3px solid #a855f7;"></div>
    <div id="secretMessage" class="message">The end is further than you thought.</div>
    <p id="pathText">Current coordinates locked. Path signature:</p>
    <div id="breadcrumbs" class="breadcrumbs"></div>
    <p id="chooseText">Choose your descent path:</p>
    <div id="doors" class="doors-container"></div>
  </div>

  <script>
    // 1. Seeded RNG Implementation
    function xmur3(str) {
      for(var i = 0, h = 1779033703 ^ str.length; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = h << 13 | h >>> 19;
      }
      return function() {
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        return (h ^= h >>> 16) >>> 0;
      }
    }

    function mulberry32(a) {
      return function() {
        var t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }

    // 2. Content Generation Data
    const eerieWords = [
      "Void", "Substratum", "Echo", "Abyss", "Nadir", "Chasm", "Monolith", "Obelisk", "Vestige", "Wraith",
      "Omen", "Amnesia", "Labyrinth", "Crux", "Zenith", "Pulse", "Murmur", "Whisper", "Vortex", "Nebula",
      "Specter", "Oblivion", "Fractal", "Aether", "Mirage", "Phantom", "Singularity", "Solitude", "Nihil", "Tesseract",
      "Tenebris", "Umbra", "Limbo", "Eidolon", "Miasma", "Revenant", "Silence", "Tomb", "Cipher", "Enigma",
      "Paradox", "Anomaly", "Stigma", "Catalyst", "Nexus", "Atrophy", "Entropy", "Gloom", "Penumbra", "Voidscape"
    ];
    const fonts = ['"Helvetica Neue", sans-serif', 'Georgia, serif', '"Courier New", monospace', '"Times New Roman", serif', 'Impact, sans-serif'];

    function generateWord(rng) {
      return eerieWords[Math.floor(rng() * eerieWords.length)];
    }

    // Scrambler logic
    const symbols = "!@#$%^&*-=_+/?><;:|}{][~`";
    function scramble(text) {
      return text.split('').map(c => c === ' ' ? ' ' : symbols[Math.floor(Math.random() * symbols.length)]).join('');
    }

    // 3. Main Render Logic
    function render() {
      // Initialize hash if empty
      if (!window.location.hash || window.location.hash === '#') {
        window.history.replaceState(null, null, '#/root');
      }

      const hash = window.location.hash;
      const segments = hash.substring(1).split('/').filter(Boolean); // skip the '#'
      const depth = Math.max(0, segments.length - 1);
      
      // High Score Persistence
      let maxDepth = parseInt(localStorage.getItem('deepestLevelReached') || '0', 10);
      if (depth > maxDepth) {
        maxDepth = depth;
        localStorage.setItem('deepestLevelReached', maxDepth);
      }
      
      const highScoreEl = document.getElementById('highScore');
      if (depth === 0 && maxDepth > 0) {
        highScoreEl.style.display = 'block';
        // Display high score (scrambled if punished, though unlikely at depth 0, it's possible if they jumped to 0 improperly)
        highScoreEl.textContent = "Deepest Level Reached: " + maxDepth;
      } else {
        highScoreEl.style.display = 'none';
      }

      // Bottomless Mechanic (Cheat Detection)
      let lastDepth = parseInt(sessionStorage.getItem('lastDepth') || '0', 10);
      let punishCount = parseInt(sessionStorage.getItem('punishCount') || '0', 10);
      let lastHash = sessionStorage.getItem('lastHash') || '#/root';

      // Detect shortcut jumps (skipping ahead)
      // Note: We check if the depth jumped by more than 1, or if they jumped to a completely different branch 
      // without going through a proper link, but basic depth check is robust enough for manual edits.
      if (depth > lastDepth + 1) {
        punishCount = 10;
        console.warn("Shortcut detected. Bottomless punishment engaged.");
      }

      // Decrement counter if we legitimately move further down or back
      if (hash !== lastHash) {
        if (punishCount > 0) {
          punishCount--;
        }
      }

      sessionStorage.setItem('lastDepth', depth);
      sessionStorage.setItem('lastHash', hash);
      sessionStorage.setItem('punishCount', punishCount);

      const isPunished = punishCount > 0;

      // Seed RNG based on the explicit string path
      const seedGen = xmur3(hash);
      const rng = mulberry32(seedGen());

      // Check False Lead Message
      const secretMessage = document.getElementById('secretMessage');
      const currentSegment = segments[segments.length - 1];
      if (currentSegment === 'THE_END' || currentSegment === 'EXIT') {
        secretMessage.style.display = 'block';
        secretMessage.textContent = isPunished ? scramble("The end is further than you thought.") : "The end is further than you thought.";
      } else {
        secretMessage.style.display = 'none';
      }

      // Update UI elements
      document.getElementById('depthLabel').textContent = depth;
      
      // Set Page Title
      const pageTitleEl = document.getElementById('pageTitle');
      const generatedTitle = depth === 0 ? "The Entry" : (generateWord(rng) + " " + generateWord(rng));
      pageTitleEl.textContent = isPunished ? scramble(generatedTitle) : generatedTitle;

      // Apply scrambled class if punished
      const terminal = document.getElementById('terminal');
      if (isPunished) {
        terminal.classList.add('scrambled');
      } else {
        terminal.classList.remove('scrambled');
      }

      // Breadcrumbs
      const breadcrumbsContainer = document.getElementById('breadcrumbs');
      breadcrumbsContainer.innerHTML = '';
      let cumulativePath = '#';
      segments.forEach((seg, index) => {
        cumulativePath += '/' + seg;
        
        const span = document.createElement('span');
        span.className = 'breadcrumb-item';
        // if punished, scramble the breadcrumbs too
        span.textContent = isPunished ? scramble(seg) : seg;
        breadcrumbsContainer.appendChild(span);

        if (index < segments.length - 1) {
          const sep = document.createElement('span');
          sep.className = 'breadcrumb-separator';
          sep.textContent = isPunished ? scramble('>') : '>';
          breadcrumbsContainer.appendChild(sep);
        }
      });
      
      // Scramble static texts if punished
      document.getElementById('pathText').textContent = isPunished ? scramble("Current coordinates locked. Path signature:") : "Current coordinates locked. Path signature:";
      document.getElementById('chooseText').textContent = isPunished ? scramble("Choose your descent path:") : "Choose your descent path:";

      // 4. Procedural Visuals
      const hue = Math.floor(rng() * 360);
      const saturation = 30 + Math.floor(rng() * 40); // 30-70%
      const lightness = 5 + Math.floor(rng() * 15);   // 5-20%
      
      document.body.style.backgroundColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
      // Allow custom fonts only if not punished (monospace override from CSS handles punished text)
      if (!isPunished) {
        document.body.style.fontFamily = fonts[Math.floor(rng() * fonts.length)];
      }

      // Construct Filter string based on Depth
      let filter = '';
      terminal.className = isPunished ? 'scrambled' : ''; // reset glitch classes

      if (depth > 50) {
        // Depth 50 to 500 mapping (0 to 1 scaling)
        const scale = Math.min(1, (depth - 50) / 450);

        filter += `hue-rotate(${Math.floor(scale * 360 * rng())}deg) `;
        
        if (depth > 100) {
          filter += `contrast(${100 + scale * 150}%) `;
          filter += `saturate(${100 + scale * 200}%) `;
        }
        
        if (depth > 200) {
           filter += `blur(${Math.floor(scale * 5 * rng())}px) `;
        }
        
        if (depth > 300) {
           if (rng() < scale * 0.5) {
             filter += `invert(${Math.floor(rng() * 100)}%) `;
           }
        }

        if (depth >= 500) {
           terminal.classList.add('glitch-intense');
        } else if (depth >= 350) {
           if (rng() > 0.5) terminal.classList.add('glitch-severe');
        } else if (depth >= 150) {
           if (rng() > 0.8) terminal.classList.add('glitch-mild');
        }
      }

      document.body.style.filter = filter.trim();

      // 5. Generate Doors
      const doorsContainer = document.getElementById('doors');
      doorsContainer.innerHTML = ''; // clear old doors

      // False Lead Logic: ~10% chance to replace a door with THE_END or EXIT
      const hasFalseLead = rng() < 0.10;
      const falseLeadIndex = hasFalseLead ? Math.floor(rng() * 3) : -1;

      for(let i=0; i<3; i++) {
        let nextWordStr = generateWord(rng);
        let displayWord = nextWordStr;
        let urlWord = nextWordStr.toLowerCase().replace(/\s+/g, '-');

        if (i === falseLeadIndex) {
          const type = rng() > 0.5 ? 'THE END' : 'EXIT';
          displayWord = type;
          urlWord = type.replace(/\s+/g, '_');
        }

        const doorHash = hash + '/' + urlWord;

        const door = document.createElement('a');
        door.href = doorHash;
        door.className = 'door';
        door.textContent = isPunished ? scramble(displayWord) : displayWord;
        
        // Slightly random color per door
        const doorHue = Math.floor(hue + (rng() * 60 - 30) + 360) % 360;
        door.style.borderColor = `hsla(${doorHue}, 60%, 50%, 0.3)`;

        // PushState navigation to prevent full browser reloads/hash jumps
        door.addEventListener('click', (e) => {
          e.preventDefault();
          window.history.pushState(null, '', doorHash);
          render();
        });

        doorsContainer.appendChild(door);
      }
    }

    // Listen to history changes
    window.addEventListener('popstate', render);
    window.addEventListener('hashchange', render);
    
    // First paint
    window.addEventListener('DOMContentLoaded', render);
    if(document.readyState === 'complete' || document.readyState === 'interactive') {
      render();
    }
  </script>
</body>
</html>
